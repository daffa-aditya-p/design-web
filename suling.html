<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suling Sunda | Warisan Nusantara </title>
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        body {
            background:
                radial-gradient(ellipse at top, #C87941 0%, #87431D 50%),
                linear-gradient(135deg, #C87941 0%, #87431D 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="bamboo" patternUnits="userSpaceOnUse" width="100" height="100"><rect width="100" height="100" fill="none"/><path d="M0,20 Q50,15 100,20 M0,40 Q50,35 100,40 M0,60 Q50,55 100,60 M0,80 Q50,75 100,80" stroke="%23DBCBBD" stroke-width="0.5" opacity="0.1" fill="none"/></pattern></defs><rect width="100%" height="100%" fill="url(%23bamboo)"/></svg>') repeat;
            opacity: 0.3;
            pointer-events: none;
        }

        .title {
            color: #DBCBBD;
            font-size: 3rem;
            font-weight: bold;
            text-shadow:
                3px 3px 6px rgba(41, 0, 1, 0.8),
                0 0 20px rgba(255, 217, 61, 0.3);
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 2px;
        }

        .instructions {
            color: #FFD93D;
            font-size: 1.3rem;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(41, 0, 1, 0.7);
            max-width: 700px;
            padding: 15px 25px;
            background: rgba(41, 0, 1, 0.2);
            border-radius: 15px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 217, 61, 0.3);
        }

        .flute-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 50px 0;
            perspective: 1000px;
        }

        .flute {
            width: 700px;
            height: 80px;
            background:
                linear-gradient(180deg, #DBCBBD 0%, #C87941 25%, #87431D 50%, #C87941 75%, #DBCBBD 100%);
            border-radius: 40px;
            position: relative;
            box-shadow:
                0 15px 30px rgba(41, 0, 1, 0.5),
                inset 0 5px 10px rgba(255, 255, 255, 0.4),
                inset 0 -5px 10px rgba(41, 0, 1, 0.3),
                0 0 50px rgba(255, 217, 61, 0.1);
            border: 3px solid #87431D;
            transform-style: preserve-3d;
        }

        .flute::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 30px;
            width: 40px;
            height: 96px;
            background:
                linear-gradient(135deg, #DBCBBD 0%, #C87941 50%, #87431D 100%);
            border-radius: 20px;
            box-shadow:
                0 8px 16px rgba(41, 0, 1, 0.4),
                inset 2px 2px 4px rgba(255, 255, 255, 0.3);
            border: 2px solid #87431D;
        }

        .flute::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 0;
            right: 0;
            height: 60px;
            background:
                repeating-linear-gradient(90deg,
                    transparent 0px,
                    rgba(135, 67, 29, 0.1) 50px,
                    transparent 100px);
            border-radius: 30px;
            pointer-events: none;
        }

        .bamboo-rings {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 40px;
            background:
                repeating-linear-gradient(90deg,
                    transparent 0px,
                    rgba(135, 67, 29, 0.2) 1px,
                    transparent 2px,
                    transparent 80px);
            pointer-events: none;
        }

        .hole {
            position: absolute;
            width: 45px;
            height: 45px;
            background:
                radial-gradient(circle at 30% 30%, #87431D 0%, #290001 50%, #000000 100%);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            transition: all 0.15s ease-out;
            box-shadow:
                inset 0 8px 16px rgba(41, 0, 1, 0.9),
                inset 0 -4px 8px rgba(135, 67, 29, 0.3),
                0 4px 8px rgba(0, 0, 0, 0.4);
            border: 2px solid #290001;
            z-index: 10;
        }

        .hole::before {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            right: 3px;
            bottom: 3px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .hole:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow:
                inset 0 10px 20px rgba(41, 0, 1, 0.95),
                inset 0 -6px 12px rgba(135, 67, 29, 0.4),
                0 8px 16px rgba(255, 217, 61, 0.3);
        }

        .hole.active {
            background:
                radial-gradient(circle at 30% 30%, #FFD93D 0%, #C87941 40%, #87431D 80%, #290001 100%);
            transform: translateY(-50%) scale(0.9);
            box-shadow:
                inset 0 4px 12px rgba(41, 0, 1, 0.7),
                0 0 25px rgba(255, 217, 61, 0.6);
            border-color: #FFD93D;
        }

        .hole.pressed {
            background:
                radial-gradient(circle at 30% 30%, #FFD93D 0%, #C87941 30%, #87431D 60%, #290001 100%);
            transform: translateY(-50%) scale(0.85);
            box-shadow:
                inset 0 6px 16px rgba(41, 0, 1, 0.8),
                0 0 30px rgba(255, 217, 61, 0.8);
        }

        .hole:nth-child(2) {
            left: 130px;
        }

        .hole:nth-child(3) {
            left: 200px;
        }

        .hole:nth-child(4) {
            left: 270px;
        }

        .hole:nth-child(5) {
            left: 340px;
        }

        .hole:nth-child(6) {
            left: 410px;
        }

        .hole:nth-child(7) {
            left: 480px;
        }

        .hole:nth-child(8) {
            left: 550px;
        }

        .key-labels {
            display: flex;
            justify-content: center;
            margin-top: 30px;
            gap: 55px;
        }

        .key-label {
            color: #FFD93D;
            font-weight: bold;
            font-size: 1.4rem;
            text-shadow: 2px 2px 4px rgba(41, 0, 1, 0.8);
            padding: 8px 12px;
            background: rgba(41, 0, 1, 0.3);
            border-radius: 8px;
            border: 1px solid rgba(255, 217, 61, 0.3);
            transition: all 0.2s ease;
        }

        .key-label.active {
            background: rgba(255, 217, 61, 0.3);
            color: #290001;
            transform: scale(1.1);
        }

        .notes-display {
            margin-top: 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .current-note {
            color: #FFD93D;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(41, 0, 1, 0.8);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .current-note.playing {
            transform: scale(1.1);
            text-shadow: 3px 3px 6px rgba(41, 0, 1, 0.8), 0 0 20px rgba(255, 217, 61, 0.6);
        }

        .sound-wave {
            position: absolute;
            border: 2px solid #FFD93D;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
            animation: waveExpand 0.6s ease-out forwards;
        }

        .footer {
            position: absolute;
            bottom : 525px;
            right: 1100px;
        }

        .footer button {
            height: 40px;
            width: 100px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 18px;
            background-color: transparent;
            border: none;
            color: #3a0001;
            border: #3a0001 2px solid;
            transition: 0.5s ease-in-out;
        }

        .footer button:hover {
            height: 40px;
            width: 100px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            background-color: #3a0001;
            border: none;
            box-shadow: 0 0px 20px 2px rgba(0, 0, 0, .5);
            color: #dbcbbd;
        }

        @keyframes waveExpand {
            0% {
                width: 20px;
                height: 20px;
                opacity: 1;
            }

            100% {
                width: 70px;
                height: 70px;
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2.2rem;
                margin-bottom: 20px;
            }

            .instructions {
                font-size: 1rem;
                margin-bottom: 30px;
                padding: 12px 20px;
            }

            .flute {
                width: 400px;
                height: 60px;
            }

            .flute::before {
                width: 30px;
                height: 76px;
                left: 20px;
                top: -8px;
            }

            .hole {
                width: 35px;
                height: 35px;
            }

            .hole:nth-child(2) {
                left: 80px;
            }

            .hole:nth-child(3) {
                left: 115px;
            }

            .hole:nth-child(4) {
                left: 150px;
            }

            .hole:nth-child(5) {
                left: 185px;
            }

            .hole:nth-child(6) {
                left: 220px;
            }

            .hole:nth-child(7) {
                left: 255px;
            }

            .hole:nth-child(8) {
                left: 290px;
            }

            .key-labels {
                gap: 32px;
                margin-left: 80px;
                font-size: 1rem;
            }

            .key-label {
                font-size: 1rem;
                padding: 6px 8px;
            }

            .current-note {
                font-size: 2rem;
            }

            .footer {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                padding: 15px 0;
                background: rgba(41, 0, 1, 0.3);
                backdrop-filter: blur(10px);
                border-top: 1px solid rgba(255, 217, 61, 0.2);
                z-index: 1000;
            }

            .footer-content {
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .footer-text {
                color: #FFD93D;
                font-size: 1rem;
                font-weight: 600;
                text-shadow: 2px 2px 4px rgba(41, 0, 1, 0.8);
                letter-spacing: 1px;
                margin: 0;
                opacity: 0.8;
                transition: opacity 0.3s ease;
            }

            .footer-text:hover {
                opacity: 1;
                text-shadow:
                    2px 2px 4px rgba(41, 0, 1, 0.8),
                    0 0 15px rgba(255, 217, 61, 0.5);
            }

            @media (max-width: 768px) {
                .footer {
                    padding: 10px 0;
                }

                .footer-text {
                    font-size: 0.9rem;
                }
            }
        }
    </style>
</head>

<body>
    <h1 class="title">Suling Sunda</h1>
    <p class="instructions">
        Klik/Tap lubang atau tekan 1-8 untuk memainkan suling Sunda<br>
        Tahan untuk nada panjang - Lepas untuk berhenti<br>
        <strong>Do - Re - Mi - Fa - Sol - La - Si - Do</strong>
    </p>

    <div class="flute-container">
        <div class="flute">
            <div class="bamboo-rings"></div>
            <div class="hole" data-note="0" data-key="1"></div>
            <div class="hole" data-note="1" data-key="2"></div>
            <div class="hole" data-note="2" data-key="3"></div>
            <div class="hole" data-note="3" data-key="4"></div>
            <div class="hole" data-note="4" data-key="5"></div>
            <div class="hole" data-note="5" data-key="6"></div>
            <div class="hole" data-note="6" data-key="7"></div>
            <div class="hole" data-note="7" data-key="8"></div>
        </div>
    </div>

    <div class="key-labels">
        <span class="key-label">1</span>
        <span class="key-label">2</span>
        <span class="key-label">3</span>
        <span class="key-label">4</span>
        <span class="key-label">5</span>
        <span class="key-label">6</span>
        <span class="key-label">7</span>
        <span class="key-label">1'</span>
    </div>

    <div class="notes-display">
        <div class="current-note" id="current-note"></div>
    </div>
    <footer class="footer">
        <a href="design-web-main/index.html"><button>Kembali</button></a>
    </footer>

    <script>
        class SulingSundaAuthentic {
            constructor() {
                this.audioContext = null;
                this.masterGain = null;
                this.reverbNode = null;

                this.notes = ['Do', 'Re', 'Mi', 'Fa', 'Sol', 'La', 'Si', 'Do'];
                this.frequencies = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];

                this.currentNote = document.getElementById('current-note');
                this.holes = document.querySelectorAll('.hole');
                this.keyLabels = document.querySelectorAll('.key-label');

                this.sustainedNotes = new Map();
                this.pressedKeys = new Set();

                this.initAudio();
                this.bindEvents();
            }

            async initAudio() {
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();

                    this.masterGain = this.audioContext.createGain();
                    this.masterGain.gain.setValueAtTime(0.35, this.audioContext.currentTime);

                    await this.createSmoothReverb();

                    this.masterGain.connect(this.reverbNode);
                    this.reverbNode.connect(this.audioContext.destination);

                } catch (error) {
                    console.error('Audio initialization failed:', error);
                }
            }

            async createSmoothReverb() {
                this.reverbNode = this.audioContext.createConvolver();

                const sampleRate = this.audioContext.sampleRate;
                const length = sampleRate * 1.5;
                const impulse = this.audioContext.createBuffer(2, length, sampleRate);

                for (let channel = 0; channel < 2; channel++) {
                    const channelData = impulse.getChannelData(channel);
                    for (let i = 0; i < length; i++) {
                        const decay = Math.pow(1 - i / length, 2.5);
                        channelData[i] = (Math.random() * 2 - 1) * decay * 0.15;
                    }
                }

                this.reverbNode.buffer = impulse;
            }

            createAuthenticFluteSound(frequency, sustainMode = false) {
                if (!this.audioContext) return null;

                const startTime = this.audioContext.currentTime;
                const soundGroup = {};

                const fundamental = this.audioContext.createOscillator();
                fundamental.type = 'sine';
                fundamental.frequency.setValueAtTime(frequency, startTime);

                const harmonic2 = this.audioContext.createOscillator();
                harmonic2.type = 'sine';
                harmonic2.frequency.setValueAtTime(frequency * 2, startTime);

                const harmonic3 = this.audioContext.createOscillator();
                harmonic3.type = 'sine';
                harmonic3.frequency.setValueAtTime(frequency * 3, startTime);

                const noiseBuffer = this.createFluteNoise();
                const noiseSource = this.audioContext.createBufferSource();
                noiseSource.buffer = noiseBuffer;
                noiseSource.loop = true;

                const fundamentalGain = this.audioContext.createGain();
                const harmonic2Gain = this.audioContext.createGain();
                const harmonic3Gain = this.audioContext.createGain();
                const noiseGain = this.audioContext.createGain();
                const masterGain = this.audioContext.createGain();

                fundamentalGain.gain.setValueAtTime(0.8, startTime);
                harmonic2Gain.gain.setValueAtTime(0.25, startTime);
                harmonic3Gain.gain.setValueAtTime(0.15, startTime);
                noiseGain.gain.setValueAtTime(0.08, startTime);

                const filter = this.audioContext.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(frequency * 4, startTime);
                filter.Q.setValueAtTime(1.2, startTime);

                const noiseFilter = this.audioContext.createBiquadFilter();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.setValueAtTime(800, startTime);
                noiseFilter.Q.setValueAtTime(0.8, startTime);

                if (sustainMode) {
                    masterGain.gain.setValueAtTime(0, startTime);
                    masterGain.gain.linearRampToValueAtTime(1, startTime + 0.06);
                } else {
                    masterGain.gain.setValueAtTime(0, startTime);
                    masterGain.gain.linearRampToValueAtTime(1, startTime + 0.04);
                    masterGain.gain.linearRampToValueAtTime(0.85, startTime + 0.08);
                    masterGain.gain.setValueAtTime(0.85, startTime + 0.6);
                    masterGain.gain.linearRampToValueAtTime(0, startTime + 0.8);
                }

                fundamental.connect(fundamentalGain);
                harmonic2.connect(harmonic2Gain);
                harmonic3.connect(harmonic3Gain);
                noiseSource.connect(noiseFilter);
                noiseFilter.connect(noiseGain);

                fundamentalGain.connect(filter);
                harmonic2Gain.connect(filter);
                harmonic3Gain.connect(filter);
                noiseGain.connect(filter);
                filter.connect(masterGain);
                masterGain.connect(this.masterGain);

                fundamental.start(startTime);
                harmonic2.start(startTime);
                harmonic3.start(startTime);
                noiseSource.start(startTime);

                if (!sustainMode) {
                    const stopTime = startTime + 0.8;
                    fundamental.stop(stopTime);
                    harmonic2.stop(stopTime);
                    harmonic3.stop(stopTime);
                    noiseSource.stop(stopTime);
                }

                soundGroup.fundamental = fundamental;
                soundGroup.harmonic2 = harmonic2;
                soundGroup.harmonic3 = harmonic3;
                soundGroup.noiseSource = noiseSource;
                soundGroup.masterGain = masterGain;

                return soundGroup;
            }

            createFluteNoise() {
                const bufferSize = this.audioContext.sampleRate * 0.1;
                const buffer = this.audioContext.createBuffer(1, bufferSize, this.audioContext.sampleRate);
                const data = buffer.getChannelData(0);

                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * 0.05;
                }

                return buffer;
            }

            playNote(noteIndex, sustainMode = false) {
                if (noteIndex < 0 || noteIndex >= this.frequencies.length) return;

                if (this.audioContext && this.audioContext.state === 'suspended') {
                    this.audioContext.resume();
                }

                const frequency = this.frequencies[noteIndex];
                const noteName = this.notes[noteIndex];

                if (sustainMode) {
                    if (this.sustainedNotes.has(noteIndex)) return;

                    const soundGroup = this.createAuthenticFluteSound(frequency, true);
                    this.sustainedNotes.set(noteIndex, soundGroup);
                } else {
                    this.createAuthenticFluteSound(frequency, false);
                }

                this.showNote(noteName);
                this.animateHole(noteIndex, sustainMode);
            }

            stopNote(noteIndex) {
                if (this.sustainedNotes.has(noteIndex)) {
                    const soundGroup = this.sustainedNotes.get(noteIndex);
                    const stopTime = this.audioContext.currentTime;

                    soundGroup.masterGain.gain.linearRampToValueAtTime(0, stopTime + 0.08);

                    setTimeout(() => {
                        try {
                            soundGroup.fundamental.stop();
                            soundGroup.harmonic2.stop();
                            soundGroup.harmonic3.stop();
                            soundGroup.noiseSource.stop();
                        } catch (e) { }
                    }, 90);

                    this.sustainedNotes.delete(noteIndex);
                    this.stopHoleAnimation(noteIndex);
                }
            }

            showNote(noteName) {
                this.currentNote.textContent = `${noteName}`;
                this.currentNote.classList.add('playing');

                setTimeout(() => {
                    if (this.sustainedNotes.size === 0) {
                        this.currentNote.textContent = '';
                        this.currentNote.classList.remove('playing');
                    }
                }, 1000);
            }

            animateHole(noteIndex, sustained = false) {
                const hole = this.holes[noteIndex];
                const keyLabel = this.keyLabels[noteIndex];

                if (!hole) return;

                hole.classList.add(sustained ? 'pressed' : 'active');
                keyLabel.classList.add('active');

                this.createSoundWave(hole);

                if (!sustained) {
                    setTimeout(() => {
                        hole.classList.remove('active');
                        keyLabel.classList.remove('active');
                    }, 200);
                }
            }

            stopHoleAnimation(noteIndex) {
                const hole = this.holes[noteIndex];
                const keyLabel = this.keyLabels[noteIndex];

                if (!hole) return;

                hole.classList.remove('pressed', 'active');
                keyLabel.classList.remove('active');
            }

            createSoundWave(hole) {
                const wave = document.createElement('div');
                wave.className = 'sound-wave';
                hole.appendChild(wave);

                setTimeout(() => {
                    if (wave.parentNode) {
                        wave.parentNode.removeChild(wave);
                    }
                }, 600);
            }

            bindEvents() {
                this.holes.forEach((hole, index) => {
                    hole.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        this.playNote(index, true);
                    });

                    hole.addEventListener('mouseup', () => {
                        this.stopNote(index);
                    });

                    hole.addEventListener('mouseleave', () => {
                        this.stopNote(index);
                    });

                    hole.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        this.playNote(index, true);
                    });

                    hole.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        this.stopNote(index);
                    });
                });

                document.addEventListener('keydown', (e) => {
                    const keyNumber = parseInt(e.key);
                    if (keyNumber >= 1 && keyNumber <= 8 && !this.pressedKeys.has(keyNumber)) {
                        this.pressedKeys.add(keyNumber);
                        this.playNote(keyNumber - 1, true);
                    }
                });

                document.addEventListener('keyup', (e) => {
                    const keyNumber = parseInt(e.key);
                    if (keyNumber >= 1 && keyNumber <= 8) {
                        this.pressedKeys.delete(keyNumber);
                        this.stopNote(keyNumber - 1);
                    }
                });

                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden && this.audioContext) {
                        this.audioContext.resume();
                    }
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new SulingSundaAuthentic();
        });
    </script>
</body>

</html>
